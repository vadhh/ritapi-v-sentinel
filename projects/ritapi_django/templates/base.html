<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ritapi V-Sentinel{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" integrity="sha384-XcdcwHqIPULERb2yDEM4R0XaQKU3YnDsrTmjACBZyfdVVqjh6xQ4/DCMd7XLcA6Y" crossorigin="anonymous"></script>


    <!-- Leaflet for maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"  integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
    <script
    src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.7/dist/sweetalert2.all.min.js"
    integrity="sha384-kbCFm2/S3Aeo6W+kDHL67KALQ56pj0cOortdL4ttsTN9rUAS7GHlvlxWkZ3V475L"
    crossorigin="anonymous">
    </script>


    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style nonce="{{ request.csp_nonce }}">
        :root {
            --primary-color: #0F172A;
            --secondary-color: #1E293B;
            --accent-color: #0EA5E9;
            --accent-hover: #0284C7;
            --danger-color: #EF4444;
            --warning-color: #F59E0B;
            --success-color: #10B981;
            --info-color: #06B6D4;
            --dark-bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-light: #0F172A;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --sidebar-width: 260px;

            /* Gradients */
            --gradient-primary: linear-gradient(180deg, #0B1120 0%, #0F172A 100%);
            --gradient-accent: linear-gradient(135deg, #0EA5E9 0%, #3B82F6 100%);
            --gradient-danger: linear-gradient(135deg, #EF4444 0%, #B91C1C 100%);
            --gradient-warning: linear-gradient(135deg, #F59E0B 0%, #B45309 100%);
            --gradient-success: linear-gradient(135deg, #10B981 0%, #047857 100%);
            --gradient-info: linear-gradient(135deg, #06B6D4 0%, #0369A1 100%);
        }
        
        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            font-size: 0.9rem;
        }

        .badge-medium {
            background: var(--gradient-warning);
            color: #000;
            font-weight: bold;
        }
        .badge-high {
            background: var(--gradient-danger);
            color: #fff;
            font-weight: bold;
        }
        .badge-low {
            background: var(--gradient-success);
            color: #fff;
            font-weight: bold;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            transition: 0.3s;
            box-shadow: 0 6px 15px rgba(0,0,0,0.5);
        }

        
        /* ── Sidebar ── */
        .sidebar {
            background: var(--gradient-primary);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            z-index: 1050;
            transition: transform 0.3s cubic-bezier(.4,0,.2,1);
            overflow-y: auto;
            overflow-x: hidden !important;
            box-shadow: 4px 0 24px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
        }

        .sidebar .nav {
            display: flex !important;
            flex-direction: column !important;
            flex-wrap: nowrap !important;
            width: 100% !important;
        }

        .sidebar .nav-item {
            width: 100% !important;
            display: block !important;
        }

        .sidebar.hidden {
            transform: translateX(calc(-1 * var(--sidebar-width)));
        }

        /* Sidebar overlay for mobile */
        #sidebarOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1040;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #sidebarOverlay.show {
            display: block;
            opacity: 1;
        }

        .sidebar .nav-link {
            color: rgba(255,255,255,0.78);
            padding: 10px 16px;
            border-radius: 10px;
            margin: 2px 10px;
            transition: all 0.2s ease;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: normal;
            word-break: break-word;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: rgba(255,255,255,0.15);
            color: #fff;
            transform: translateX(3px);
        }

        .sidebar .nav-link i {
            width: 18px;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        /* ── Main Content ── */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 24px;
            transition: margin-left 0.3s cubic-bezier(.4,0,.2,1);
            min-height: 100vh;
        }

        .main-content.expanded {
            margin-left: 0;
        }

        /* ── Navbar ── */
        .navbar.sticky-top {
            position: sticky;
            top: 0;
            z-index: 1030;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(37,99,235,0.04);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(37,99,235,0.12);
        }

        .card-header {
            background: var(--gradient-accent);
            color: white;
            border-bottom: none;
            border-radius: 16px 16px 0 0 !important;
            font-weight: 600;
            letter-spacing: 0.01em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ── Stat Cards ── */
        .stats-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            min-height: 110px;
            padding: 1.25rem;
            border-radius: 12px;
            margin-bottom: 0;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .stats-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .stat-card {
            background: linear-gradient(135deg, #fff 60%, rgba(37,99,235,0.06) 100%);
            border-left: 4px solid var(--accent-color);
        }

        /* ── Responsive Utils ── */
        @media (max-width: 768px) {
            .card-header {
                flex-direction: column;
                align-items: flex-start !important;
                gap: 10px;
            }
            .card-tools, .card-tools form, .card-tools .input-group {
                width: 100% !important;
                max-width: 100% !important;
            }
            .stats-card {
                min-height: 100px;
                padding: 1rem;
            }
            .stats-card h3 {
                font-size: 1.5rem;
            }
            .stats-card h6 {
                font-size: 0.8rem;
            }
            
            /* Navbar alignment fixes */
            .navbar .container-fluid {
                flex-wrap: nowrap !important;
                justify-content: space-between;
                padding-left: 10px;
                padding-right: 10px;
            }
            .navbar-brand {
                font-size: 0.85rem !important;
                margin-right: 5px !important;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 110px;
                flex-shrink: 1;
            }
            .navbar .d-flex.gap-3 {
                gap: 0.35rem !important;
                flex-shrink: 0;
            }
            #monitorStatus {
                padding: 3px 6px !important;
                font-size: 0.65rem !important;
            }
            #lastUpdate {
                font-size: 0.65rem !important;
                white-space: nowrap;
            }
            #sidebarToggleBtn1 {
                width: 32px !important;
                height: 32px !important;
            }
        }

        .stat-card.danger {
            border-left-color: var(--danger-color);
            background: linear-gradient(135deg, #fff 60%, rgba(239,68,68,0.07) 100%);
        }

        .stat-card.warning {
            border-left-color: var(--warning-color);
            background: linear-gradient(135deg, #fff 60%, rgba(245,158,11,0.07) 100%);
        }

        .stat-card.success {
            border-left-color: var(--success-color);
            background: linear-gradient(135deg, #fff 60%, rgba(16,185,129,0.07) 100%);
        }

        .stat-number {
            font-size: 2.2rem;
            font-weight: 800;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar {
            background: #ffffff !important;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 1px 8px rgba(0,0,0,0.06);
        }

        .navbar-brand {
            color: var(--primary-color) !important;
            font-weight: 700;
            font-size: 1rem;
        }
        
        .btn-primary {
            background: var(--gradient-accent);
            border: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
        }
        
        .btn-danger {
            background: var(--gradient-danger);
            border: none;
            border-radius: 8px;
        }
        
        .btn-warning {
            background: var(--gradient-warning);
            border: none;
            border-radius: 8px;
        }
        
        .btn-success {
            background: var(--gradient-success);
            border: none;
            border-radius: 8px;
        }
        
        .table-dark {
            background-color: var(--card-bg);
        }
        
        .table-dark td, .table-dark th {
            border-color: var(--border-color);
        }
        
        .badge {
            border-radius: 20px;
            padding: 8px 12px;
        }
        
        .alert {
            border-radius: 12px;
            border: none;
        }
        
        .progress {
            height: 8px;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .progress-bar {
            border-radius: 10px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        
        .status-online {
            background-color: var(--success-color);
            box-shadow: 0 0 10px var(--success-color);
        }
        
        .status-offline {
            background-color: var(--danger-color);
            box-shadow: 0 0 10px var(--danger-color);
        }
        
        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }
        
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* ── SOC UI Animations ── */
        @keyframes blink-alert {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.85); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.85); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        @keyframes slide-in-fade {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes glow-critical {
            0%, 100% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); }
            50% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); border-color: rgba(239, 68, 68, 0.8); }
        }
        @keyframes radar-scan {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .sidebar-toggle {
            display: none;
        }

        /* Hamburger button in navbar */
        #sidebarToggleBtn1 {
            background: #f3f4f6;
            color: #1e3a5f;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
            flex-shrink: 0;
        }
        #sidebarToggleBtn1:hover {
            background: #1e3a5f;
            color: #ffffff;
        }

        @media (max-width: 991px) {
            .sidebar {
                transform: translateX(calc(-1 * var(--sidebar-width)));
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0 !important;
            }
        }
        
        .real-time-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--success-color);
            border-radius: 50%;
            animation: pulse 2s infinite;
            margin-right: 5px;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.7);
            }
            
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(39, 174, 96, 0);
            }
            
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(39, 174, 96, 0);
            }
        }
        .sidebar .nav-link[aria-expanded="true"] .fa-chevron-down {
            transform: rotate(180deg);
            transition: transform 0.3s ease;
        }

        #requestsChart {
            width: 100% !important;
            height: 280px !important; /* perbesar tinggi grafik */
        }

    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Mobile Sidebar Overlay -->
    <div id="sidebarOverlay"></div>

    {% include "sidebar.html" %}
    
    
    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <!-- Top Navigation -->
        <nav class="navbar navbar-expand-lg sticky-top mb-4" style="background:#ffffff; border-bottom:1px solid #e5e7eb; box-shadow:0 1px 6px rgba(0,0,0,0.06);">
            <div class="container-fluid">
                <!-- Page Title (left) -->
                <span class="navbar-brand fw-semibold" style="color:#1e3a5f; font-size:1rem;">
                    {% block page_title %}Ritapi V-Sentinel{% endblock %}
                </span>

                <!-- Right side items -->
                <div class="d-flex align-items-center gap-3 ms-auto">
                    <!-- Monitor Status -->
                    <span class="badge bg-success d-flex align-items-center gap-1" id="monitorStatus">
                        <span class="status-indicator status-online" aria-hidden="true"></span>
                        Online
                    </span>

                    <!-- Last Update -->
                    <small id="lastUpdate" style="color:#000000; font-weight:600;">
                        Last update: <span id="updateTime">--:--</span>
                    </small>

                    <!-- Hamburger Toggle (pojok kanan) -->
                    <button class="btn btn-sm border-0 d-flex align-items-center justify-content-center"
                            id="sidebarToggleBtn1"
                            aria-label="Toggle Sidebar"
                            style="background:#f3f4f6; color:#1e3a5f; width:36px; height:36px; border-radius:8px; transition:background 0.2s;">
                        <i class="fas fa-bars" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </nav>

        
        <!-- Alerts Container -->
        <div id="alertContainer"></div>
        
        <!-- Main Content Area -->
        {% block content %}{% endblock %}
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <!-- CSS DataTables -->
    <link rel="stylesheet"
        href="https://cdn.datatables.net/1.13.5/css/dataTables.bootstrap5.min.css"
        integrity="sha384-5oFfLntNy8kuC2TaebWZbaHTqdh3Q+7PwYbB490gupK0YtTAB7mBJGv4bQl9g9rK"
        crossorigin="anonymous">

    <!-- JS DataTables -->
    <script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"
            integrity="sha384-8YRuqcmsgzJVFNG6QuO77MAyein6qrWXIY/kkAnn/R8wksSCqhCkWNELjDllpffy"
            crossorigin="anonymous"></script>

    <script src="https://cdn.datatables.net/1.13.5/js/dataTables.bootstrap5.min.js"
            integrity="sha384-dgTxndj+aTqKfEhg2Q5EVhy+lf8oMgZLYOgl5p7B71gTNhAjWRX+CGwXJh9Q5SBV"
            crossorigin="anonymous"></script>


    
    <!-- Custom JavaScript -->
    <script nonce="{{ request.csp_nonce }}">
        // Sidebar toggle
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            const overlay = document.getElementById('sidebarOverlay');
            const isMobile = window.innerWidth < 992;

            if (isMobile) {
                const showing = sidebar.classList.toggle('show');
                if (overlay) {
                    overlay.classList.toggle('show', showing);
                }
            } else {
                const hidden = sidebar.classList.toggle('hidden');
                mainContent.classList.toggle('expanded', hidden);
                localStorage.setItem('sidebarState', hidden ? 'hidden' : 'visible');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            const overlay = document.getElementById('sidebarOverlay');

            // Restore desktop state
            if (window.innerWidth >= 992) {
                const isHidden = localStorage.getItem('sidebarState') === 'hidden';
                if (isHidden) {
                    sidebar.classList.add('hidden');
                    mainContent.classList.add('expanded');
                }
            }

            document.getElementById('sidebarToggleBtn1')?.addEventListener('click', toggleSidebar);
            document.getElementById('sidebarToggleBtn2')?.addEventListener('click', toggleSidebar);

            // Close sidebar when overlay clicked (mobile)
            overlay?.addEventListener('click', function() {
                sidebar.classList.remove('show');
                overlay.classList.remove('show');
            });
        });
        
        // Update time display
        function updateTime() {
            const now = new Date();
            document.getElementById('updateTime').textContent = now.toLocaleTimeString();
        }
        
        // Initialize
        updateTime();
        setInterval(updateTime, 1000);
        
        // WebSocket connection for real-time updates
        let dashboardSocket = null;
        
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/dashboard/`;
            
            dashboardSocket = new WebSocket(wsUrl);
            
            dashboardSocket.onopen = function(e) {
                console.log('Dashboard WebSocket connected');
                updateMonitorStatus(true);
            };
            
            dashboardSocket.onmessage = function(e) {
                const data = JSON.parse(e.data);
                if (data.type === 'dashboard_update') {
                    updateDashboardStats(data.data);
                }
            };
            
            dashboardSocket.onclose = function(e) {
                console.log('Dashboard WebSocket disconnected');
                updateMonitorStatus(false);
                // Attempt to reconnect after 5 seconds
                setTimeout(connectWebSocket, 5000);
            };
            
            dashboardSocket.onerror = function(e) {
                console.error('Dashboard WebSocket error:', e);
                updateMonitorStatus(false);
            };
        }
        
        function updateMonitorStatus(isOnline) {
            const statusElement = document.getElementById('monitorStatus');
            if (isOnline) {
                statusElement.innerHTML = '<span class="status-indicator status-online"></span>Online';
                statusElement.className = 'badge bg-success';
            } else {
                statusElement.innerHTML = '<span class="status-indicator status-offline"></span>Offline';
                statusElement.className = 'badge bg-danger';
            }
        }
        
        function updateDashboardStats(stats) {
            // Update dashboard statistics if elements exist
            Object.keys(stats).forEach(key => {
                const element = document.getElementById(key);
                if (element) {
                    element.textContent = stats[key];
                }
            });
            
            // Update system metrics if they exist
            if (stats.system_metrics) {
                updateSystemMetrics(stats.system_metrics);
            }
        }
        
        function updateSystemMetrics(metrics) {
            // Update CPU usage
            const cpuElement = document.getElementById('cpuUsage');
            if (cpuElement) {
                cpuElement.style.width = metrics.cpu_usage + '%';
                cpuElement.textContent = metrics.cpu_usage.toFixed(1) + '%';
            }
            
            // Update Memory usage
            const memoryElement = document.getElementById('memoryUsage');
            if (memoryElement) {
                memoryElement.style.width = metrics.memory_usage + '%';
                memoryElement.textContent = metrics.memory_usage.toFixed(1) + '%';
            }
            
            // Update other metrics
            ['active_connections', 'packets_per_second'].forEach(metric => {
                const element = document.getElementById(metric);
                if (element) {
                    element.textContent = metrics[metric];
                }
            });
        }
        
        // Show notifications
        function showNotification(message, type = 'info') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            alertContainer.appendChild(alertDiv);

            // Automatically scroll to the top
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            // Auto-remove after 5 seconds
            setTimeout(() => {
                if (alertDiv.parentNode) {
                    alertDiv.remove();
                }
            }, 5000);
        }
        
        // Initialize WebSocket connection
        {% comment %} document.addEventListener('DOMContentLoaded', function() {
            connectWebSocket();
        }); {% endcomment %}
        
        // Handle window resize
        window.addEventListener('resize', function() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (window.innerWidth >= 992) {
                sidebar.classList.remove('show');
                overlay?.classList.remove('show');
            }
        });

        document.addEventListener("DOMContentLoaded", function() {
            const logoutLink = document.getElementById("logout-link");
            const logoutForm = document.getElementById("logout-form");

            if (logoutLink && logoutForm) {
                logoutLink.addEventListener("click", function(e) {
                    e.preventDefault();
                    logoutForm.submit();
                });
            }
        });

        // Preserve sidebar scroll position
        document.addEventListener("DOMContentLoaded", function() {
            const sidebar = document.getElementById("sidebar");
            if (sidebar) {
                const scrollPos = sessionStorage.getItem("sidebarScrollPos");
                if (scrollPos) {
                    sidebar.scrollTop = parseInt(scrollPos, 10);
                }
                sidebar.addEventListener("scroll", function() {
                    sessionStorage.setItem("sidebarScrollPos", sidebar.scrollTop);
                });
            }
        });
    </script>
    
    <!-- Global SweetAlert2 dark theme -->
    <script nonce="{{ request.csp_nonce }}">
        if (typeof Swal !== 'undefined') {
            const _swalFire = Swal.fire.bind(Swal);
            Swal.fire = function(args) {
                if (typeof args === 'object' && !args.background) {
                    args.background = '#2d3748';
                    args.color = '#cbd5e0';
                }
                return _swalFire(args);
            };
        }
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
