name: Pre-Flight Production Check

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"

jobs:
  security-audit:
    name: Security & Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit safety bandit detect-secrets

      - name: Scan for hardcoded secrets
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          detect-secrets scan --all-files --force-use-all-plugins || true
          
      - name: Check for .env files in repo
        run: |
          echo "🔍 Checking for committed .env files..."
          if find . -name ".env" -not -path "./.git/*" -not -path "./venv/*" -not -path "./.venv/*" | grep -q .; then
            echo "❌ ERROR: .env files found in repository:"
            find . -name ".env" -not -path "./.git/*" -not -path "./venv/*" -not -path "./.venv/*"
            exit 1
          else
            echo "✅ No .env files found in repository"
          fi

      - name: Audit Django dependencies for CVEs
        working-directory: projects/ritapi_django
        run: |
          echo "🔍 Auditing Django dependencies..."
          pip install -r requirements.txt
          pip-audit --desc || echo "⚠️ Vulnerabilities found in Django dependencies"

      - name: Audit MiniFW-AI dependencies for CVEs
        working-directory: projects/minifw_ai_service
        run: |
          echo "🔍 Auditing MiniFW-AI dependencies..."
          pip install -r requirements.txt
          pip-audit --desc || echo "⚠️ Vulnerabilities found in MiniFW-AI dependencies"

      - name: Run Bandit security linter
        run: |
          echo "🔍 Running Bandit security analysis..."
          bandit -r projects/minifw_ai_service/app -ll -f json -o bandit-report.json || true
          bandit -r projects/ritapi_django -ll || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
          retention-days: 30

  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black isort mypy

      - name: Run flake8
        run: |
          echo "🔍 Running flake8..."
          flake8 projects/minifw_ai_service/app --count --select=E9,F63,F7,F82 --show-source --statistics || true
          flake8 projects/ritapi_django --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Check for TODO/FIXME in production paths
        run: |
          echo "🔍 Scanning for TODO/FIXME/XXX/HACK..."
          grep -rn "TODO\|FIXME\|XXX\|HACK" \
            projects/minifw_ai_service/app \
            projects/ritapi_django \
            --include="*.py" || echo "✅ No critical TODOs found"

      - name: Check code formatting with black
        run: |
          echo "🔍 Checking code formatting..."
          black --check projects/minifw_ai_service/app projects/ritapi_django || echo "⚠️ Code formatting issues found"

  test-minifw-ai:
    name: Test MiniFW-AI Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: projects/minifw_ai_service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE/projects/minifw_ai_service/app:$PYTHONPATH" >> $GITHUB_ENV

      - name: Run tests with coverage
        working-directory: projects/minifw_ai_service
        env:
          MINIFW_SECRET_KEY: test-secret-key-for-ci-only
          MINIFW_ADMIN_PASSWORD: test-admin-pass-ci
        run: |
          echo "🧪 Running MiniFW-AI tests..."
          pytest testing/ -v --cov=app --cov-report=xml --cov-report=term || echo "⚠️ Some tests failed"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: minifw-coverage
          path: projects/minifw_ai_service/coverage.xml
          retention-days: 30

  test-django:
    name: Test Django Application
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ritapi_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: ritapi_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: projects/ritapi_django
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Run Django migrations
        working-directory: projects/ritapi_django
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci-only
          DB_NAME: ritapi_test
          DB_USER: ritapi_test
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
        run: |
          echo "🔄 Running Django migrations..."
          python manage.py migrate --noinput || echo "⚠️ Migration issues detected"

      - name: Run Django tests
        working-directory: projects/ritapi_django
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci-only
          DB_NAME: ritapi_test
          DB_USER: ritapi_test
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
        run: |
          echo "🧪 Running Django tests..."
          python manage.py test || echo "⚠️ Some tests failed"

  pre-flight-report:
    name: Generate Pre-Flight Report
    runs-on: ubuntu-latest
    needs: [security-audit, code-quality, test-minifw-ai, test-django]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Pre-Flight Summary
        run: |
          echo "# 🚀 Pre-Flight Production Check Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MiniFW-AI Tests | ${{ needs.test-minifw-ai.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Django Tests | ${{ needs.test-django.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Final Verdict
        run: |
          if [[ "${{ needs.security-audit.result }}" == "failure" ]]; then
            echo "## ❌ VERDICT: NO-GO" >> $GITHUB_STEP_SUMMARY
            echo "**Critical security issues detected. Do not deploy to production.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [[ "${{ needs.test-minifw-ai.result }}" == "failure" || "${{ needs.test-django.result }}" == "failure" ]]; then
            echo "## ⚠️ VERDICT: CAUTION" >> $GITHUB_STEP_SUMMARY
            echo "**Test failures detected. Review before production deployment.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "## ✅ VERDICT: GO (with recommendations)" >> $GITHUB_STEP_SUMMARY
            echo "**Basic checks passed. Review security audit findings.**" >> $GITHUB_STEP_SUMMARY
          fi
